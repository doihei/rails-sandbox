services:
  db:
    image: postgres:17
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    # ポートをホストに公開しない（Nginxからのみアクセスさせる）
    expose:
      - "3000"
    env_file: .env
    environment:
      RAILS_ENV: development
      SOLID_QUEUE_IN_PUMA: true
    depends_on:
      db:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      # Nginx設定ファイルをマウント
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      # 静的ファイルをNginxから直接配信するためにマウント
      - .:/rails
    depends_on:
      - app

volumes:
  postgres_data:
  bundle_cache:
